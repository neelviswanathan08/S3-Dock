# --- 1. FACTORY RUN SETTINGS ---
run_folder_name: "test_run"
num_seeds: 2
samples_per_seed: 1
max_discovery_loops: 5

# --- 2. PEPTIDE DESIGN CONSTRAINTS ---
peptide_length: 22
secondary_structure: "helix"  
peptide_property: "amphipathic"
custom_pattern: ""

# 🔬 BENCHMARK GATEKEEPER
benchmark_mode: true                        # Set to true to bypass generator and run 1000 folds
benchmark_sequence: "MEFVAKLFKFFKDLLGKFLGNN"  # PSM-alpha-3 Control Sequence

# Strict Biochemical Filtering Targets (Used if benchmark_mode is false)
target_net_charge: 3       
boman_index_min: 1         
hydrophobic_moment_target: 0.4

# --- 2b. EVOLUTIONARY OPTIMIZER (MONTE CARLO) SETTINGS ---
rng_seed:     782348        # Seed for reproducibility
charge_tolerance: 0.5        # Allowable deviation from target_net_charge
charge_weight: 10            # Penalty multiplier for missing charge target
boman_weight: 5              # Penalty multiplier for missing Boman target
moment_weight: 5             # Penalty multiplier for missing Hydrophobic Moment
max_mutations: 50000         # Maximum iterations before giving up
plateau_patience: 800        # Iterations stuck before forcing a multi-site jump
initial_temp: 1.5            # Starting temperature for Simulated Annealing
cooling_rate: 0.9995         # Rate at which the system "cools" and locks in
dedupe_output: True          # Ensure all output seeds are unique

# --- 3. DYNAMIC RECEPTOR TARGET SETTINGS ---
target_cif: "inputs/target_receptor.cif"
binder_chain_id: "K"

target_chains_and_sequences:
  A: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  B: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  C: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  D: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  E: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  F: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  G: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  H: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  I: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  J: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"

# --- 4. UNIVERSAL STRUCTURAL POCKET CONSTRAINTS ---
max_distance_threshold: 5.0
pocket_contacts:
  - ["I", 10]
  - ["I", 11]
  - ["I", 12]
  - ["I", 13]
  - ["I", 14]
  - ["I", 15]
  - ["I", 16]
  - ["I", 17]
  - ["I", 18]
  - ["I", 19]
  - ["J", 10]
  - ["J", 11]
  - ["J", 12]
  - ["J", 13]
  - ["J", 14]
  - ["J", 15]
  - ["J", 16]
  - ["J", 17]
  - ["J", 18]
  - ["J", 19]

# --- 5. QUALITY CONTROL GATEKEEPERS ---
rmsd_cutoff: 3.5
dist_threshold: 2.5
max_bad_atoms: 350

# --- 6. HADDOCK3 BLIND GLOBAL DOCKING SETTINGS ---
run_haddock: true                   
haddock_sampling: 1000             
haddock_seletop: 200                
haddock_top_clusters: 5             

# --- 7. OPENMM MOLECULAR DYNAMICS SETTINGS ---
md_simulation_steps: 50000000         
md_reporting_interval: 10000         
md_temperature_kelvin: 310.15       

# --- 8. MMPBSA ENERGY CALCULATION SETTINGS ---
mmpbsa_start_frame: 1
mmpbsa_end_frame: 5000
mmpbsa_interval: 10
mmpbsa_salt_concentration: 0.150

# --- 9. MM-GBSA ENERGY CALCULATION SETTINGS ---
mmgbsa_reporting_interval: 50