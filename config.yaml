# =====================================================================
# S3-DOCK: MASTER CONFIGURATION FILE
# =====================================================================

# --- 1. FACTORY RUN SETTINGS ---
run_folder_name: "test_run"
num_seeds:  5              # Default to 1000 tracks (Ignored if benchmark_mode is true)
samples_per_seed: 1           # 1 structural prediction per fasta seed entry
max_discovery_loops: 5

# --- 2. PEPTIDE DESIGN CONSTRAINTS ---
peptide_length: 22

# Structural Control ("helix" or "beta_sheet")
secondary_structure: "helix"  

# Chemical Property ("amphipathic", "hydrophobic", "hydrophilic")
peptide_property: "amphipathic"

# Override (Leave blank "" to let the pipeline build the H/P pattern automatically)
custom_pattern: ""

# 🔬 BENCHMARK GATEKEEPER MATRIX
# Set benchmark_mode to true to duplicate the sequence across 1000 slots and select the top 1
benchmark_mode: false                        
benchmark_sequence: "MEFVAKLFKFFKDLLGKFLGNN"  # PSM-alpha-3 Control Sequence
benchmark_samples: 150                    # Total fasta seeds to write into library.fasta

# Strict Biochemical Filtering Targets (Used if benchmark_mode is false)
target_net_charge: 3       # Target electrical charge at pH 7.4
boman_index_min: 1         # Minimum binding potential/solubility
hydrophobic_moment_target: 0.4

# --- 2b. EVOLUTIONARY OPTIMIZER (MONTE CARLO) SETTINGS ---
rng_seed: 5         # Master RNG seed for deep learning and optimizer reproducibility
charge_tolerance: 0.5        
charge_weight: 10            
boman_weight: 5              
moment_weight: 5             
max_mutations: 50000         
plateau_patience: 800        
initial_temp: 1.5            
cooling_rate: 0.9995         
dedupe_output: True          

# --- 3. DYNAMIC RECEPTOR TARGET SETTINGS ---
target_cif: "inputs/6CU7.cif"
binder_chain_id: "K"
is_fibril: false

target_chains_and_sequences:
  A: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  B: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  C: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  D: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  E: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  F: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  G: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  H: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  I: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  J: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"

# --- 4. UNIVERSAL STRUCTURAL POCKET CONSTRAINTS ---
max_distance_threshold: 5.0
pocket_contacts:
  - ["I", 10]
  - ["I", 11]
  - ["I", 12]
  - ["I", 13]
  - ["I", 14]
  - ["I", 15]
  - ["I", 16]
  - ["I", 17]
  - ["I", 18]
  - ["I", 19]
  - ["J", 10]
  - ["J", 11]
  - ["J", 12]
  - ["J", 13]
  - ["J", 14]
  - ["J", 15]
  - ["J", 16]
  - ["J", 17]
  - ["J", 18]
  - ["J", 19]

# --- 5. QUALITY CONTROL GATEKEEPERS ---
rmsd_cutoff: 3.5
dist_threshold: 2.5
max_bad_atoms: 350

# --- 6. HADDOCK3 BLIND GLOBAL DOCKING SETTINGS ---
rnd_haddock_seed: 100
run_haddock: true                   
haddock_sampling: 10             
haddock_seletop: 2                
haddock_top_clusters: 1            

# --- 7. OPENMM MOLECULAR DYNAMICS SETTINGS ---
md_simulation_steps: 50000       # Production-scale trajectory length
md_reporting_interval: 1000         # Yields exactly 5,000 saved trajectory frames
md_temperature_kelvin: 310.15       

# --- 8. MMPBSA ENERGY CALCULATION SETTINGS ---
mmpbsa_start_frame: 25             # Excludes first 50% relaxation/burn-in window
mmpbsa_end_frame: 50              # Terminal frame boundaries
mmpbsa_interval: 5                  # Samples exactly 250 production frames
mmpbsa_salt_concentration: 0.150

# --- 9. MM-GBSA ENERGY CALCULATION SETTINGS ---
mmgbsa_reporting_interval: 2.5        # Evaluates exactly 100 evenly distributed coordinates
