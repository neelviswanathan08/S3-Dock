# =====================================================================
# S3-DOCK: MASTER CONFIGURATION FILE
# =====================================================================

# --- 1. FACTORY RUN SETTINGS ---
run_folder_name: "antibody"
num_seeds:  150           # Default to 1000 tracks (Ignored if benchmark_mode is true)
samples_per_seed: 1           # 1 structural prediction per fasta seed entry
max_discovery_loops: 5

# --- 2. PEPTIDE DESIGN CONSTRAINTS ---
peptide_length: 15

# Structural Control ("helix" or "beta_sheet")
secondary_structure: "helix"  

# Chemical Property ("amphipathic", "hydrophobic", "hydrophilic")
peptide_property: "amphipathic"

# Override (Leave blank "" to let the pipeline build the H/P pattern automatically)
custom_pattern: ""

# 🔬 BENCHMARK GATEKEEPER MATRIX
# Set benchmark_mode to true to duplicate the sequence across 1000 slots and select the top 1
benchmark_mode: true                        
benchmark_sequence: "CEDGNYDYAMDYC"  # PSM-alpha-3 Control Sequence
benchmark_samples: 20                    # Total fasta seeds to write into library.fasta

# Strict Biochemical Filtering Targets (Used if benchmark_mode is false)
target_net_charge: -2    # Target electrical charge at pH 7.4
boman_index_min: 1         # Minimum binding potential/solubility
hydrophobic_moment_target: 0.4

# --- 2b. EVOLUTIONARY OPTIMIZER (MONTE CARLO) SETTINGS ---
rng_seed: 100     # Master RNG seed for deep learning and optimizer reproducibility
charge_tolerance: 0.5        
charge_weight: 10            
boman_weight: 5              
moment_weight: 5             
max_mutations: 50000         
plateau_patience: 800        
initial_temp: 1.5            
cooling_rate: 0.9995         
dedupe_output: True          

# --- 3. DYNAMIC RECEPTOR TARGET SETTINGS ---
target_cif: "inputs/anti.cif"
binder_chain_id: "D"
is_fibril: false

target_chains_and_sequences:
  A: "DIVLTQSPATLSVTPGNSVSLSCRASQSIGNNLHWYQQKSHESPRLLIKYASQSISGIPSRFSGSGSGTDFTLSINSVETEDFGMYFCQQSNSWPYTFGGGTKLEIKRADAAPTVSIFPPSSEQLTSGGASVVCFLNNFYPKDINVKWKIDGSERQNGVLNSWTDQDSKDSTYSMSSTLTLTKDEYERHNSYTCEATHKTSTSPIVKSFNRNEC"
  B: "DVQLQESGPSLVKPSQTLSLTCSVTGDSITSDYWSWIRKFPGNRLEYMGYVSYSGSTYYNPSLKSRISITRDTSKNQYYLDLNSVTTEDTATYYCANWDGDYWGQGTLVTVSAAKTTPPSVYPLAPGSAAQTNSMVTLGCLVKGYFPEPVTVTWNSGSLSSGVHTFPAVLQSDLYTLSSSVTVPSSPRPSETVTCNVAHPASSTKVDKKIVPRDC"
  C: "KVFGRCELAAAMKRHGLDNYRGYSLGNWVCAAKFESNFNTQATNRNTDGSTDYGILQINSRWWCNDGRTPGSRNLCNIPCSALLSSDITASVNCAKKIVSDGNGMNAWVAWRNRCKGTDVQAWIRGCRL"

# --- 4. UNIVERSAL STRUCTURAL POCKET CONSTRAINTS ---
max_distance_threshold: 5.0
pocket_contacts:
  - ["C", 6]
  - ["C", 8]
  - ["C", 62]
  - ["C", 63]
  - ["C", 101]
  - ["C", 102]
  - ["C", 103]

# --- 5. QUALITY CONTROL GATEKEEPERS ---
enforce_boltz_constraints: false 
require_pocket_filter: true
min_pocket_contacts: 3       
max_distance_threshold: 5.0

rmsd_cutoff: 3.5
dist_threshold: 2.5
max_bad_atoms: 350
iptm_threshold: 0.20
tm_threshold: 0.75


# --- 6. HADDOCK3 BLIND GLOBAL DOCKING SETTINGS ---
run_haddock: false                  # Set to true to run HADDOCK, false to skip to OpenMM
rnd_haddock_seed: 100
haddock_sampling: 1000             
haddock_seletop: 100                
haddock_top_clusters: 10            


# --- 7. OPENMM MOLECULAR DYNAMICS SETTINGS ---
md_simulation_steps: 100000      # Production-scale trajectory length
md_reporting_interval: 10000         # Yields exactly 5,000 saved trajectory frames
md_temperature_kelvin: 310.15       

# --- 8. THERMODYNAMIC FREE ENERGY SETTINGS ---
# Choose your solver: "mm-gbsa", "mm-pbsa", or "none"
free_energy_method: "mm-pbsa"      

# Universal Energy Parameters
energy_start_frame: 5             
energy_end_frame: 10               
energy_interval: 1                  
energy_salt_concentration: 0.150

# --- 9. MM-GBSA ENERGY CALCULATION SETTINGS ---
energy_reporting_interval: 1        # Evaluates exactly 100 evenly distributed coordinates