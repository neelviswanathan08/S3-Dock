# =====================================================================
# S3-DOCK: MASTER CONFIGURATION FILE
# =====================================================================

# --- 1. FACTORY RUN SETTINGS ---
run_folder_name: "Test_run"
top_k: 3                    # Number of top candidates to select globally
num_seeds: 15               # Total sequences to generate (if benchmark_mode is false)
samples_per_seed: 1         # 1 structural prediction per fasta seed entry
max_discovery_loops: 5

# --- 2. PEPTIDE DESIGN CONSTRAINTS ---
peptide_length: 22
secondary_structure: "helix"  
peptide_property: "amphipathic"
custom_pattern: ""          # Leave blank to build H/P pattern automatically

# 🔬 BENCHMARK GATEKEEPER MATRIX
benchmark_mode: false                        
benchmark_sequence: "MEFVAKLFKFFKDLLGKFLGNN"  
benchmark_samples: 150                    

# Strict Biochemical Filtering Targets
target_net_charge: +3       
boman_index_min: 1         
hydrophobic_moment_target: 0.45

# --- 2b. EVOLUTIONARY OPTIMIZER (MONTE CARLO) SETTINGS ---
rng_seed: 0         
charge_tolerance: 0.5        
charge_weight: 10            
boman_weight: 5              
moment_weight: 5             
max_mutations: 50000         
plateau_patience: 800        
initial_temp: 1.5            
cooling_rate: 0.9995         
dedupe_output: True          

# --- 3. DYNAMIC RECEPTOR TARGET SETTINGS ---
target_cif: "inputs/6CU7.cif" 
binder_chain_id: "K"
is_fibril: true

target_chains_and_sequences:
  A: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  B: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  C: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  D: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  E: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  F: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  G: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  H: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  I: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"
  J: "LYVGSKTKEGVVHGVATVAEKTKEQVTNVGGAVVTGVTAVAQKTVEGAGSIAAATGFVKK"

# --- 4. UNIVERSAL STRUCTURAL POCKET CONSTRAINTS ---
pocket_contacts:
  - ["I", 10]
  - ["I", 11]
  - ["I", 12]
  - ["I", 13]
  - ["I", 14]
  - ["I", 15]
  - ["I", 16]
  - ["I", 17]
  - ["I", 18]
  - ["I", 19]
  - ["J", 10]
  - ["J", 11]
  - ["J", 12]
  - ["J", 13]
  - ["J", 14]
  - ["J", 15]
  - ["J", 16]
  - ["J", 17]
  - ["J", 18]
  - ["J", 19]

# --- 5. QUALITY CONTROL GATEKEEPERS ---
enforce_boltz_constraints: false 
require_pocket_filter: true
min_pocket_contacts: 3       
max_distance_threshold: 5.0

rmsd_cutoff: 3.5
dist_threshold: 2.5
max_bad_atoms: 350
iptm_threshold: 0.25
tm_threshold: 0.75

# --- 6. HADDOCK3 BLIND GLOBAL DOCKING SETTINGS ---
rnd_haddock_seed: 1
run_haddock: true                   
haddock_sampling: 10             
haddock_seletop: 5                
haddock_top_clusters: 2            

# --- 7. OPENMM MOLECULAR DYNAMICS SETTINGS ---
md_simulation_steps: 50000       
md_reporting_interval: 1000         
md_temperature_kelvin: 310.15       

# --- 8. MMPBSA ENERGY CALCULATION SETTINGS ---
mmpbsa_start_frame: 25             
mmpbsa_end_frame: 50              
mmpbsa_interval: 1                  
mmpbsa_salt_concentration: 0.150

# --- 9. MM-GBSA ENERGY CALCULATION SETTINGS ---
mmgbsa_reporting_interval: 2.5
